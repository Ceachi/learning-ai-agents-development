# Homework 4 — PostgreSQL (with pgvector) for ConversationMemory long-term storage.
#
# Start:
#   docker-compose up -d
#
# Connection string (used by code):
#   postgresql://skillab:skillab_dev@localhost:5432/skillab

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: hw4-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-skillab}
      POSTGRES_USER: ${POSTGRES_USER:-skillab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-skillab_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillab -d skillab"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: hw4-postgres-data
